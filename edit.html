">

    </button>

</div>

<script src="towndata.js"></script>

<script>

const deliveries =
    JSON.parse(localStorage.getItem("deliveries")) || [];

const currentDeliveryId =
    Number(localStorage.getItem("currentDeliveryId"));

const delivery =
    deliveries.find(function(item) {
        return item.id === currentDeliveryId;
    });

if (delivery) {

    updateTownList(delivery.city);

    document.getElementById("townInput").value =
        delivery.town;

    document.getElementById("addressInput").value =
        delivery.address;

    document.getElementById("memoInput").value =
        delivery.memo;
}

function saveMemo() {
   const memo =
    document.getElementById("memoInput").value;

const town =
    document.getElementById("townInput").value;

const address =
    document.getElementById("addressInput").value;

delivery.memo = memo;
delivery.town = town;
delivery.address = address;

localStorage.setItem(
    "deliveries",
    JSON.stringify(deliveries)
);

location.href = "detail.html";
}

</script>
