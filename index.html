<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>
<body class="homePage"> 

<button onclick="selectCourse('堺コース')">
    堺コース
</button>
<br><br>

<button onclick="selectIzumi()">
    和泉コース
</button>
<br><br>

<button onclick="selectCourse('岸和田コース')">
    岸和田コース
</button>
<br><br>

<button onclick="selectCourse('八尾コース')">
    八尾コース
</button>
<br><br>

<button onclick="selectNaraNorth()">
    奈良北コース
</button>
<br><br>

<button onclick="selectCourse('奈良南コース')">
    奈良南コース
</button>
<br><br>


<div class="bottomButtons">

    <button class="searchButton" onclick="location.href='search.html'">
        🔍住所から
    </button>

    <button class="newButton" onclick="location.href='new.html'">
        ⊕新規登録
    </button>

</div>

<script>
function selectCourse(course) {
    localStorage.setItem("currentCourse", course);

    location.href = "city.html";
}

function selectNaraNorth() {
    localStorage.setItem("currentCourse", "奈良北コース");

    location.href = "nara-city.html";
}

function selectIzumi() {
    localStorage.setItem("currentCourse", "和泉コース");

    location.href = "izumi-city.html";
}

function selectSakaiHigashi() {
    localStorage.setItem("currentCity", "堺市東区");
    location.href = "town.html";
}

function selectSakaiNaka() {
    localStorage.setItem("currentCity", "堺市中区");
    location.href = "town.html";
}

function selectSakaiNishi() {
    localStorage.setItem("currentCity", "堺市西区");
    location.href = "town.html";
}

function selectSakaiMinami() {
    localStorage.setItem("currentCity", "堺市南区");
    location.href = "town.html";
}

function selectSakaiMihara() {
    localStorage.setItem("currentCity", "堺市美原区");
    location.href = "town.html";
}

</script>

</body>
</html>
